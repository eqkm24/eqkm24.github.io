<div class="wrap">
  <div class="page-hd">
    <div class="page-hd-label">스텔라 마을</div>
    <h1 class="page-hd-title">마을원 <em>명단</em></h1>
    <p class="page-hd-sub">스텔라 마을 구성원 정보</p>
  </div>

  <div class="member-toolbar">
    <input class="input" id="mb-search" type="text"
      placeholder="🔍 마을원 검색..."
      oninput="renderMembers()"
      style="max-width:280px;">
    <button class="btn btn-primary" onclick="openMemberModal()" id="mb-add-btn" style="display:none;">
      + 마을원 등록
    </button>
    <button class="btn btn-danger btn-sm" onclick="resetMembers()" id="mb-reset-btn" style="display:none;">
      초기화
    </button>
    <span class="member-count" id="mb-count"></span>
  </div>

  <div class="member-grid" id="mb-grid"></div>
  <div id="mb-modal-root"></div>
</div>
