<div class="page" id="pg-recipe">
<div class="wrap">

  <div class="ph">
    <div class="ph-title">🌿 생활 <span style="color:var(--counter);">제작</span></div>
    <div class="ph-sub">숙련도별 제작 레시피 · 허름한 작업대 / 허름한 화로</div>
  </div>

  <!-- 카테고리 탭 (저 이미지 스타일) -->
  <div class="lc-tabs">
    <button class="lc-tab lc-on" data-lc="mining"   onclick="switchLifecat('mining')">⛏ 채광</button>
    <button class="lc-tab"       data-lc="fishing"  onclick="switchLifecat('fishing')">🎣 낚시</button>
    <button class="lc-tab"       data-lc="farming"  onclick="switchLifecat('farming')">🌾 농사</button>
    <button class="lc-tab"       data-lc="enhance"  onclick="switchLifecat('enhance')">⚙ 강화재료</button>
  </div>

  <!-- 검색 -->
  <div style="margin-bottom:20px;">
    <div style="position:relative;">
      <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);">🔍</span>
      <input id="lc-search" class="lc-search-input" placeholder="제작품 또는 재료 이름으로 검색..."
        oninput="renderLifecat()">
    </div>
  </div>

  <!-- 카드 그리드 -->
  <div class="lc-grid" id="lc-grid"></div>

</div>
</div>
