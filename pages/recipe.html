<div class="wrap">
  <div class="page-hd">
    <div class="page-hd-label">제작 레시피</div>
    <h1 class="page-hd-title">제작 <em>레시피</em></h1>
    <p class="page-hd-sub">편백나무 작업대 · 허름한 화로 · 허름한 조리대</p>
  </div>

  <!-- 제작대 탭 -->
  <div class="recipe-tabs">
    <div class="recipe-tab active" data-cat="bench"
      onclick="switchRecipeCat('bench',this)">🔧 편백나무 작업대</div>
    <div class="recipe-tab" data-cat="brazier"
      onclick="switchRecipeCat('brazier',this)">🔥 허름한 화로</div>
    <div class="recipe-tab" data-cat="counter"
      onclick="switchRecipeCat('counter',this)">🥣 허름한 조리대</div>
  </div>

  <!-- 설치 제한 안내 -->
  <div class="recipe-cap-info" id="recipe-cap"></div>

  <!-- 검색 -->
  <div style="margin-bottom:16px;position:relative;">
    <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);">🔍</span>
    <input class="input" id="recipe-search" type="text"
      placeholder="제작품 또는 재료 검색..."
      oninput="renderRecipe()"
      style="padding-left:36px;">
  </div>

  <div class="recipe-grid" id="recipe-grid"></div>
</div>
