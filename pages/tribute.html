<div class="wrap">
  <div class="page-hd">
    <div class="page-hd-label">스텔라 마을</div>
    <h1 class="page-hd-title">조공 <em>포인트</em></h1>
    <p class="page-hd-sub">인당 6,000P 목표 · 추가 버튼으로 이름+포인트 기록</p>
  </div>
  <div class="tribute-summary" id="tb-summary"></div>
  <div class="member-toolbar">
    <input class="input" id="tb-search" type="text" placeholder="🔍 마을원 검색..."
      oninput="renderTribute()" style="max-width:280px;">
    <button class="btn btn-primary" onclick="openTributeModal()">+ 조공 추가</button>
    <button class="btn btn-danger btn-sm" id="tb-reset-btn" onclick="resetTribute()" style="display:none;">초기화</button>
  </div>
  <div class="tribute-list" id="tb-list"></div>

  
  <div style="margin-top:32px;">
    <div class="section-label">조공 XP 참고표</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;">
      <div class="card" style="padding:12px 14px;">
        <div style="font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px;">🍒 농작물</div>
        <div style="font-size:11px;color:var(--muted);line-height:1.8;">커먼 1xp<br>언커먼 2xp<br>레어 7xp</div>
      </div>
      <div class="card" style="padding:12px 14px;">
        <div style="font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px;">🐟 물고기</div>
        <div style="font-size:11px;color:var(--muted);line-height:1.8;">커먼 4xp<br>언커먼 9xp<br>레어 20xp</div>
      </div>
      <div class="card" style="padding:12px 14px;">
        <div style="font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px;">⛏ 광물</div>
        <div style="font-size:11px;color:var(--muted);line-height:1.8;">석탄 0.001<br>철 0.005<br>금 1xp<br>다이아 4xp</div>
      </div>
      <div class="card" style="padding:12px 14px;">
        <div style="font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px;">💎 후원</div>
        <div style="font-size:11px;color:var(--muted);line-height:1.8;">레드 200xp<br>다크블루 500xp<br>퍼플 1000xp</div>
      </div>
    </div>
  </div>
  <div id="tb-modal-root"></div>
</div>
